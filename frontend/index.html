<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proustian</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #8B1A1A;
      --red-dark: #5C0E0E;
      --red-pale: #F9ECEC;
      --cream: #FDF8F2;
      --ink: #1A0800;
      --ink-mid: #5C2A18;
      --ink-light: #9A6040;
      --gold-pale: #FBF3E0;
      --white: #FFFFFF;
    }
    html, body { height: 100%; font-family: 'DM Sans', system-ui, sans-serif; background: var(--cream); color: var(--ink); -webkit-font-smoothing: antialiased; }
    .app { max-width: 420px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; background: var(--cream); }

    .topbar {
      display: flex; align-items: center; justify-content: center;
      padding: 20px 20px 14px;
      background: var(--cream);
      border-bottom: 1px solid rgba(139,26,26,0.07);
      position: relative;
    }
    .brand { text-align: center; }
    .brand-name { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 30px; font-weight: 700; color: var(--red); letter-spacing: 3px; text-transform: uppercase; line-height: 1; }
    .settings-btn {
      position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
      width: 38px; height: 38px; border-radius: 50%;
      border: 1.5px solid rgba(139,26,26,0.15); background: transparent;
      display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s;
    }
    .settings-btn:hover { background: var(--red-pale); border-color: var(--red); }
    .settings-btn svg { width: 17px; height: 17px; stroke: var(--red); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    .scroll-area { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 130px; }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* REMY: centred, large, with bubbles orbiting */
    .remy-stage {
      position: relative;
      width: 100%;
      height: 380px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .remy-figure {
      position: relative;
      z-index: 5;
      width: 90px;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
    }
    .remy-img {
      width: 90px;
      height: auto;
      object-fit: contain;
      filter: none;
      animation: remyFloat 5s ease-in-out infinite;
    }
    @keyframes remyFloat {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-8px); }
    }

    /* BUBBLES: absolute positioned around Remy */
    .bubble {
      position: absolute;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s ease;
      padding: 10px;
      animation: popIn 0.55s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .bubble:hover { transform: scale(1.1) !important; z-index: 20; }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.4); }
      to   { opacity: 1; transform: scale(1); }
    }
    .bubble.past { background: var(--red); border: 2.5px solid var(--red-dark); }
    .bubble.past-soft { background: var(--red-pale); border: 2px solid rgba(139,26,26,0.22); }
    .bubble.rec { background: var(--gold-pale); border: 2px solid rgba(184,146,42,0.28); }

    .b-dish { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 700; line-height: 1.2; }
    .b-from { font-size: 9px; margin-top: 2px; line-height: 1.3; }
    .b-review { font-size: 9px; font-style: italic; margin-top: 3px; line-height: 1.3; }
    .b-stars { display: flex; gap: 1.5px; margin-top: 4px; justify-content: center; }
    .b-stars svg { width: 9px; height: 9px; }
    .b-push { font-size: 8.5px; line-height: 1.35; margin-top: 4px; font-style: italic; }

    .bubble.past .b-dish, .bubble.past .b-from, .bubble.past .b-review { color: #fff; }
    .bubble.past-soft .b-dish { color: var(--red-dark); font-size: 13px; }
    .bubble.past-soft .b-from, .bubble.past-soft .b-review { color: var(--ink-mid); }
    .bubble.rec .b-dish { color: #5C3800; }
    .bubble.rec .b-from, .bubble.rec .b-push { color: #7a5200; }

    /* DIVIDER */
    .divider { display: flex; align-items: center; gap: 12px; padding: 4px 28px; }
    .divider-line { flex: 1; height: 1px; background: rgba(139,26,26,0.1); }
    .divider-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(139,26,26,0.3); }

    /* CHAT */
    .chat-thread { padding: 10px 20px 0; display: flex; flex-direction: column; gap: 12px; }
    .msg-row { display: flex; gap: 10px; align-items: flex-end; }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-av { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: var(--red-pale); border: 1.5px solid rgba(139,26,26,0.18); }
    .msg-av svg { width: 14px; height: 14px; fill: none; stroke: var(--red); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .msg-av.uav { background: var(--red); border-color: var(--red-dark); }
    .msg-av.uav svg { stroke: white; }
    .msg-bub { max-width: 76%; padding: 10px 14px; font-size: 13.5px; line-height: 1.55; border-radius: 18px; }
    .msg-bub.remy { background: var(--white); border: 1.5px solid rgba(139,26,26,0.1); border-bottom-left-radius: 4px; color: var(--ink); }
    .msg-bub.user { background: var(--red); border-bottom-right-radius: 4px; color: white; }
    .mem-tag { display: inline-block; background: var(--red-pale); color: var(--red-dark); font-size: 10.5px; padding: 2px 8px; border-radius: 20px; margin: 4px 2px 0 0; border: 1px solid rgba(139,26,26,0.18); }

    .typing-row { display: flex; gap: 10px; align-items: flex-end; }
    .typing-bub { padding: 11px 16px; background: var(--white); border: 1.5px solid rgba(139,26,26,0.1); border-radius: 18px; border-bottom-left-radius: 4px; display: flex; gap: 4px; align-items: center; }
    .typing-bub span { width: 5px; height: 5px; background: rgba(139,26,26,0.35); border-radius: 50%; animation: tdot 1.2s ease-in-out infinite; }
    .typing-bub span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bub span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tdot { 0%,80%,100% { transform: translateY(0); opacity: 0.5; } 40% { transform: translateY(-5px); opacity: 1; } }

    /* INPUT */
    .input-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 420px; padding: 10px 16px 24px; background: linear-gradient(to top, var(--cream) 68%, transparent); z-index: 20; }
    .pills-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; }
    .pills-row::-webkit-scrollbar { display: none; }
    .pill { flex-shrink: 0; font-size: 11.5px; color: var(--red); background: var(--red-pale); border: 1px solid rgba(139,26,26,0.2); border-radius: 20px; padding: 5px 12px; cursor: pointer; white-space: nowrap; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
    .pill:hover { background: var(--red); color: white; border-color: var(--red); }
    .input-wrap { display: flex; align-items: center; gap: 10px; background: var(--white); border: 2px solid var(--red); border-radius: 50px; padding: 7px 7px 7px 18px; box-shadow: 0 2px 14px rgba(139,26,26,0.14); transition: box-shadow 0.2s; }
    .input-wrap:focus-within { box-shadow: 0 4px 22px rgba(139,26,26,0.22); }
    .chat-input { flex: 1; border: none; outline: none; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--ink); caret-color: var(--red); }
    .chat-input::placeholder { color: var(--ink-light); opacity: 0.55; }
    .send-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--red); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s, transform 0.1s; }
    .send-btn:hover { background: var(--red-dark); }
    .send-btn:active { transform: scale(0.92); }
    .send-btn svg { width: 15px; height: 15px; stroke: white; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; margin-left: 1px; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="brand">
      <div class="brand-name">Proustian</div>
    </div>
    <button class="settings-btn" onclick="onSettings()" aria-label="Settings">

          <svg viewBox="0 0 10 10"><polygon points="5,1 6.2,3.8 9,4.2 7,6.1 7.6,9 5,7.5 2.4,9 3,6.1 1,4.2 3.8,3.8" fill="rgba(255,255,255,0.92)"/></svg>

        </div>
        <div class="b-review" style="color:rgba(255,255,255,0.82)">"Smoky. Perfect."</div>
      </div>

      <!-- Bubble 2: top-right, medium past-soft -->
      <div class="bubble past-soft" style="width:106px;height:106px;right:8px;top:8px;animation-delay:0.12s" onclick="fillInput('Truffle pasta last night')">

          <svg viewBox="0 0 10 10"><polygon points="5,1 6.2,3.8 9,4.2 7,6.1 7.6,9 5,7.5 2.4,9 3,6.1 1,4.2 3.8,3.8" fill="none" stroke="#8B1A1A" stroke-width="0.9"/></svg>
          <svg viewBox="0 0 10 10"><polygon points="5,1 6.2,3.8 9,4.2 7,6.1 7.6,9 5,7.5 2.4,9 3,6.1 1,4.2 3.8,3.8" fill="none" stroke="#8B1A1A" stroke-width="0.9"/></svg>
        </div>
        <div class="b-review" style="color:var(--ink-mid)">"A bit heavy."</div>
      </div>

      <!-- Bubble 3: centre-top small rec -->
      <div class="bubble rec" style="width:82px;height:82px;left:50%;top:10px;transform:translateX(-50%);animation-delay:0.2s" onclick="fillInput('Vidyarthi Bhavan dosa')">
        <div class="b-dish" style="font-size:11px">Masala Dosa</div>
        <div class="b-from">Vidyarthi Bhavan</div>
        <div class="b-push">time for one</div>

        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>

</div>
<script>
  const API = 'http://localhost:8000';
  function fillInput(t) { const el = document.getElementById('chatInput'); el.value = t; el.focus(); }
  function appendMsg(role, text) {
    const thread = document.getElementById('chatThread');
    const row = document.createElement('div');
    row.className = 'msg-row' + (role === 'user' ? ' user' : '');
    const avCls = role === 'user' ? 'msg-av uav' : 'msg-av';
    const icon = role === 'user'
      ? `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`
      : `<svg viewBox="0 0 24 24" fill="none" stroke="#8B1A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
    row.innerHTML = `<div class="${avCls}">${icon}</div><div class="msg-bub ${role}">${text}</div>`;
    thread.appendChild(row);
    scrollDown();
  }
  function showTyping() {
    const thread = document.getElementById('chatThread');
    const row = document.createElement('div'); row.className = 'typing-row'; row.id = 'typingRow';
    row.innerHTML = `<div class="msg-av"><svg viewBox="0 0 24 24" fill="none" stroke="#8B1A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div><div class="typing-bub"><span></span><span></span><span></span></div>`;
    thread.appendChild(row); scrollDown();
  }
  function removeTyping() { const el = document.getElementById('typingRow'); if (el) el.remove(); }
  function scrollDown() { const a = document.getElementById('scrollArea'); setTimeout(() => a.scrollTo({ top: a.scrollHeight, behavior: 'smooth' }), 60); }
  function sendMsg() {
    const el = document.getElementById('chatInput');
    const text = el.value.trim(); if (!text) return;
    el.value = ''; appendMsg('user', text); showTyping();
    fetch(API + '/chat/', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: text, user_id: 'demo-user' }) })
    .then(r => r.json()).then(d => { removeTyping(); appendMsg('remy', d.reply || d.response || 'Hmm...'); })
    .catch(() => { removeTyping(); appendMsg('remy', 'Kitchen offline. Try again?'); });
  }
  function onSettings() { appendMsg('remy', 'Settings coming soon!'); }
</script>
